name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB:       testdb
          POSTGRES_USER:     test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV:           test
      USE_MONGO:          true
      USE_PG:             false
      MONGODB_URI:        mongodb://localhost:27017/testdb
      DATABASE_URL:       postgresql://test:test@localhost:5432/testdb
      JWT_SECRET:         test_secret_key_for_ci_min_32_chars_long
      JWT_REFRESH_SECRET: test_refresh_secret_for_ci_32chars_lng

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test -- --coverage
